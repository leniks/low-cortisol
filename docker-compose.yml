name: matmod-rag

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: matmod-rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-matmod_rag}
      POSTGRES_USER: ${POSTGRES_USER:-matmod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-matmod_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./infra/postgres/data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
      - ./infra/postgres/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  agents:
    build:
      context: ./agents
    container_name: matmod-rag-agents
    volumes:
      - ./agents/dumps:/app/dumps
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-matmod}:${POSTGRES_PASSWORD:-matmod_password}@postgres:5432/${POSTGRES_DB:-matmod_rag}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID:-b1goa02eskrgbk1pg322}
      YANDEX_API_KEY: ${YANDEX_API_KEY:-}
      YANDEX_LLM_BASE_URL: ${YANDEX_LLM_BASE_URL:-https://llm.api.cloud.yandex.net/v1}
      YANDEX_AI_BASE_URL: ${YANDEX_AI_BASE_URL:-https://llm.api.cloud.yandex.net/foundationModels/v1}
      YANDEX_CHAT_MODEL: ${YANDEX_CHAT_MODEL:-gpt://${YANDEX_FOLDER_ID:-b1goa02eskrgbk1pg322}/qwen3.6-35b-a3b/latest}
      YANDEX_CLASSIFIER_MODEL: ${YANDEX_CLASSIFIER_MODEL:-${YANDEX_CHAT_MODEL:-gpt://${YANDEX_FOLDER_ID:-b1goa02eskrgbk1pg322}/qwen3.6-35b-a3b/latest}}
      YANDEX_CLARIFIER_MODEL: ${YANDEX_CLARIFIER_MODEL:-${YANDEX_CLASSIFIER_MODEL:-${YANDEX_CHAT_MODEL:-gpt://${YANDEX_FOLDER_ID:-b1goa02eskrgbk1pg322}/qwen3.6-35b-a3b/latest}}}
      YANDEX_QUERY_ENRICHER_MODEL: ${YANDEX_QUERY_ENRICHER_MODEL:-${YANDEX_CLASSIFIER_MODEL:-${YANDEX_CHAT_MODEL:-gpt://${YANDEX_FOLDER_ID:-b1goa02eskrgbk1pg322}/qwen3.6-35b-a3b/latest}}}
      YANDEX_RERANKER_MODEL: ${YANDEX_RERANKER_MODEL:-${YANDEX_CLASSIFIER_MODEL:-${YANDEX_CHAT_MODEL:-gpt://${YANDEX_FOLDER_ID:-b1goa02eskrgbk1pg322}/qwen3.6-35b-a3b/latest}}}
      YANDEX_QUERY_EMBEDDING_MODEL: ${YANDEX_QUERY_EMBEDDING_MODEL:-emb://${YANDEX_FOLDER_ID:-b1goa02eskrgbk1pg322}/text-search-query/latest}
      RAG_VECTOR_TABLE: ${RAG_VECTOR_TABLE:-rag_embeddings}
      RAG_EMBEDDING_COLUMN: ${RAG_EMBEDDING_COLUMN:-embedding}
      RAG_TOP_K: ${RAG_TOP_K:-30}
      RAG_RERANK_MAX_KEEP: ${RAG_RERANK_MAX_KEEP:-10}
      RAG_DESCRIPTION_CHARS: ${RAG_DESCRIPTION_CHARS:-450}
    ports:
      - "${AGENT_SERVICE_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      agents:
        condition: service_healthy
    environment:
      AGENT_SERVICE_URL: ${AGENT_SERVICE_URL:-http://agents:8001}
      DATABASE_URL: postgresql://${POSTGRES_USER:-matmod}:${POSTGRES_PASSWORD:-matmod_password}@postgres:5432/${POSTGRES_DB:-matmod_rag}
      MOCK_MODE: ${MOCK_MODE:-false}
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
